<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>转盘抽奖</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #0f0f1a;
  color: #e8e8f0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  overflow-x: hidden;
}
.app {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
  width: 100%;
  max-width: 560px;
}
h1 {
  font-size: 1.6rem;
  font-weight: 700;
  letter-spacing: 1px;
  background: linear-gradient(135deg, #ff6b9d, #c678ff, #6ec1e4);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.input-area {
  display: flex;
  gap: 8px;
  width: 100%;
}
.input-area input {
  flex: 1;
  padding: 12px 16px;
  border: 2px solid #2a2a3e;
  border-radius: 10px;
  background: #1a1a2e;
  color: #e8e8f0;
  font-size: 1rem;
  outline: none;
  transition: border-color 0.2s;
}
.input-area input:focus { border-color: #c678ff; }
.input-area button {
  padding: 12px 20px;
  border: none;
  border-radius: 10px;
  background: #c678ff;
  color: #fff;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
  white-space: nowrap;
}
.input-area button:hover { background: #a855f7; }
.input-area button:active { transform: scale(0.96); }
.tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  width: 100%;
  min-height: 32px;
}
.tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  border-radius: 20px;
  background: #1e1e36;
  border: 1px solid #333355;
  font-size: 0.9rem;
  color: #ccc;
  animation: tagIn 0.25s ease;
}
.tag .remove {
  cursor: pointer;
  opacity: 0.5;
  transition: opacity 0.15s;
  font-size: 0.8rem;
}
.tag .remove:hover { opacity: 1; }
@keyframes tagIn {
  from { opacity: 0; transform: scale(0.8); }
  to { opacity: 1; transform: scale(1); }
}
.wheel-wrap {
  position: relative;
  width: 340px;
  height: 340px;
  flex-shrink: 0;
}
canvas {
  width: 100%;
  height: 100%;
  filter: drop-shadow(0 0 24px rgba(198, 120, 255, 0.25));
}
.pointer {
  position: absolute;
  top: -8px;
  left: 50%;
  transform: translateX(-50%);
  width: 0;
  height: 0;
  border-left: 16px solid transparent;
  border-right: 16px solid transparent;
  border-top: 30px solid #ff6b9d;
  filter: drop-shadow(0 2px 6px rgba(255,107,157,0.5));
  z-index: 2;
}
.spin-btn {
  padding: 14px 48px;
  border: none;
  border-radius: 14px;
  background: linear-gradient(135deg, #ff6b9d, #c678ff);
  color: #fff;
  font-size: 1.15rem;
  font-weight: 700;
  letter-spacing: 2px;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.2s;
  box-shadow: 0 4px 20px rgba(198, 120, 255, 0.35);
}
.spin-btn:hover { transform: scale(1.04); box-shadow: 0 6px 28px rgba(198, 120, 255, 0.5); }
.spin-btn:active { transform: scale(0.97); }
.spin-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
.result {
  min-height: 56px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.result-text {
  font-size: 1.4rem;
  font-weight: 700;
  opacity: 0;
  transition: opacity 0.3s;
}
.result-text.show {
  opacity: 1;
  animation: pop 0.4s ease;
}
@keyframes pop {
  0% { transform: scale(0.6); opacity: 0; }
  60% { transform: scale(1.15); }
  100% { transform: scale(1); opacity: 1; }
}
.confetti-container {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 100;
}
.confetti-piece {
  position: absolute;
  width: 8px;
  height: 8px;
  border-radius: 2px;
  top: -10px;
  animation: confettiFall linear forwards;
}
@keyframes confettiFall {
  to { top: 110vh; transform: rotate(720deg); }
}
</style>
</head>
<body>
<div class="app">
  <h1>&#x1f3b0; 转盘抽奖</h1>
  <div class="input-area">
    <input type="text" id="choiceInput" placeholder="输入一个选项，按回车或点击添加" maxlength="20">
    <button onclick="addChoice()">添加</button>
  </div>
  <div class="tags" id="tags"></div>
  <div class="wheel-wrap">
    <div class="pointer"></div>
    <canvas id="wheel" width="680" height="680"></canvas>
  </div>
  <button class="spin-btn" id="spinBtn" onclick="spin()">开始转动</button>
  <div class="result">
    <div class="result-text" id="resultText"></div>
  </div>
</div>
<div class="confetti-container" id="confetti"></div>
<script>
const COLORS = [
  '#ff6b9d','#c678ff','#6ec1e4','#f9a825','#ff5252',
  '#69f0ae','#ff8a65','#42a5f5','#ab47bc','#26c6da',
  '#ef5350','#8d6e63','#78909c','#d4e157','#ff7043',
  '#5c6bc0','#29b6f6','#ec407a','#7e57c2','#ffa726'
];
let choices = [];
let spinning = false;
let currentAngle = 0;
const canvas = document.getElementById('wheel');
const ctx = canvas.getContext('2d');
const cx = 340, cy = 340, radius = 290;
const input = document.getElementById('choiceInput');
input.addEventListener('keydown', function(e) { if (e.key === 'Enter') addChoice(); });
function addChoice() {
  var text = input.value.trim();
  if (!text || choices.length >= 20 || choices.indexOf(text) !== -1) return;
  choices.push(text);
  input.value = '';
  renderTags();
  drawWheel();
  document.getElementById('resultText').className = 'result-text';
}
function removeChoice(i) {
  choices.splice(i, 1);
  renderTags();
  drawWheel();
  document.getElementById('resultText').className = 'result-text';
}
function renderTags() {
  var el = document.getElementById('tags');
  el.innerHTML = choices.map(function(c, i) {
    return '<span class="tag">' + esc(c) + ' <span class="remove" onclick="removeChoice(' + i + ')">&#x2715;</span></span>';
  }).join('');
}
function esc(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
function drawWheel() {
  ctx.clearRect(0, 0, 680, 680);
  if (choices.length === 0) {
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.fillStyle = '#1a1a2e';
    ctx.fill();
    ctx.strokeStyle = '#333355';
    ctx.lineWidth = 4;
    ctx.stroke();
    ctx.fillStyle = '#555';
    ctx.font = '28px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('添加至少 2 个选项', cx, cy);
    return;
  }
  var n = choices.length;
  var sliceAngle = (Math.PI * 2) / n;
  for (var i = 0; i < n; i++) {
    var startA = currentAngle + i * sliceAngle;
    var endA = startA + sliceAngle;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, radius, startA, endA);
    ctx.closePath();
    ctx.fillStyle = COLORS[i % COLORS.length];
    ctx.fill();
    ctx.strokeStyle = '#1a1a2e';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(startA + sliceAngle / 2);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 26px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    var text = choices[i].length > 8 ? choices[i].slice(0, 8) + '...' : choices[i];
    ctx.fillText(text, radius * 0.58, 0);
    ctx.restore();
  }
  ctx.beginPath();
  ctx.arc(cx, cy, 40, 0, Math.PI * 2);
  ctx.fillStyle = '#1a1a2e';
  ctx.fill();
  ctx.strokeStyle = '#c678ff';
  ctx.lineWidth = 3;
  ctx.stroke();
  ctx.fillStyle = '#c678ff';
  ctx.font = 'bold 22px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('GO', cx, cy);
}
function spin() {
  if (spinning || choices.length < 2) return;
  spinning = true;
  document.getElementById('spinBtn').disabled = true;
  document.getElementById('resultText').className = 'result-text';
  var n = choices.length;
  var sliceAngle = (Math.PI * 2) / n;
  var targetIdx = Math.floor(Math.random() * n);
  var targetAngle = -(Math.PI / 2) - targetIdx * sliceAngle - sliceAngle / 2 - currentAngle;
  var totalSpin = targetAngle + (Math.PI * 2) * (5 + Math.floor(Math.random() * 3));
  var duration = 3500 + Math.random() * 1000;
  var startTime = performance.now();
  var startAngle = currentAngle;
  function easeOut(t) { return 1 - Math.pow(1 - t, 4); }
  function animate(now) {
    var elapsed = now - startTime;
    var t = Math.min(elapsed / duration, 1);
    currentAngle = startAngle + totalSpin * easeOut(t);
    drawWheel();
    if (t < 1) {
      requestAnimationFrame(animate);
    } else {
      currentAngle = currentAngle % (Math.PI * 2);
      spinning = false;
      document.getElementById('spinBtn').disabled = false;
      var result = choices[targetIdx];
      var el = document.getElementById('resultText');
      el.textContent = '\uD83C\uDF89 ' + result;
      el.className = 'result-text show';
      launchConfetti();
    }
  }
  requestAnimationFrame(animate);
}
function launchConfetti() {
  var container = document.getElementById('confetti');
  container.innerHTML = '';
  var colors = ['#ff6b9d','#c678ff','#6ec1e4','#f9a825','#ff5252','#69f0ae'];
  for (var i = 0; i < 60; i++) {
    var piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = (Math.random() * 100) + 'vw';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.animationDuration = (1.5 + Math.random() * 1.5) + 's';
    piece.style.animationDelay = (Math.random() * 0.5) + 's';
    piece.style.width = (6 + Math.random() * 6) + 'px';
    piece.style.height = (6 + Math.random() * 6) + 'px';
    container.appendChild(piece);
  }
  setTimeout(function() { container.innerHTML = ''; }, 4000);
}
drawWheel();
</script>
</body>
</html>
